name: Auto-deploy Cloud on OSS update

on:
  push:
    branches: [main]
    paths:
      - 'dashboard.py'
      - 'clawmetry/**'
      - 'setup.py'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual deploy'
        required: false
        default: 'manual trigger'

jobs:
  deploy-cloud:
    name: Rebuild cloud with latest OSS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OSS repo
        uses: actions/checkout@v4

      - name: Get OSS version
        id: oss_version
        run: |
          VERSION=$(python3 -c "import re; m=re.search(r'__version__ = \"([^\"]+)\"', open('dashboard.py').read()); print(m.group(1))")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building cloud with clawmetry==$VERSION"

      - name: Checkout cloud repo
        uses: actions/checkout@v4
        with:
          repository: vivekchand/clawmetry-cloud
          token: ${{ secrets.CLOUD_REPO_PAT }}
          path: clawmetry-cloud

      - name: Pin clawmetry version in cloud Dockerfile
        run: |
          cd clawmetry-cloud
          # Update pin (handles both pinned and unpinned)
          sed -i "s/clawmetry==[0-9.]*/clawmetry==${{ steps.oss_version.outputs.version }}/" Dockerfile
          # If no pin existed, add one
          grep -q "clawmetry==${{ steps.oss_version.outputs.version }}" Dockerfile || \
            sed -i "s/clawmetry$/clawmetry==${{ steps.oss_version.outputs.version }}/" Dockerfile
          echo "Dockerfile now has:"
          grep clawmetry Dockerfile

      - name: Commit version bump if changed
        run: |
          cd clawmetry-cloud
          git config user.email "diya-bot@clawmetry.com"
          git config user.name "Diya (auto-deploy)"
          git add Dockerfile
          git diff --staged --quiet && echo "No Dockerfile change" || \
            git commit -m "chore: auto-pin clawmetry==${{ steps.oss_version.outputs.version }} from OSS"
          git push

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: openclaw-mc

      - name: Deploy to Cloud Run
        run: |
          cd clawmetry-cloud
          gcloud run deploy clawmetry-cloud \
            --source . \
            --region europe-west1 \
            --project openclaw-mc \
            --allow-unauthenticated \
            --quiet
          echo "✅ Cloud deployed with clawmetry==${{ steps.oss_version.outputs.version }}"
